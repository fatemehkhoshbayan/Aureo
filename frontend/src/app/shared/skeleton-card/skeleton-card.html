<article
  class="bg-card rounded-2xl overflow-hidden shadow-sm flex flex-col animate-pulse"
  aria-hidden="true"
>
  <!-- Cover -->
  <div class="relative h-48 bg-muted">
    <div class="absolute top-3 right-3 w-9 h-9 rounded-full bg-muted-foreground/15"></div>
  </div>

  <div class="p-5 flex flex-col flex-1 gap-2">
    <!-- Avatar + name / location -->
    <div class="flex items-start gap-3 mb-3">
      <div class="w-11 h-11 rounded-full shrink-0 bg-muted ring-2 ring-card"></div>
      <div class="flex-1 min-w-0 space-y-2 pt-0.5">
        <div class="h-4 bg-muted rounded w-3/4"></div>
        <div class="h-3 bg-muted rounded w-1/2"></div>
      </div>
    </div>

    <!-- Specialty pills -->
    <div class="flex flex-wrap gap-1.5 mb-3">
      <div class="h-5 w-16 rounded-full bg-muted"></div>
      <div class="h-5 w-20 rounded-full bg-muted"></div>
      <div class="h-5 w-14 rounded-full bg-muted"></div>
    </div>

    <!-- Rating row -->
    <div class="flex items-center gap-2 mb-4">
      <div class="h-3.5 w-20 rounded bg-muted"></div>
      <div class="h-3.5 w-8 rounded bg-muted"></div>
      <div class="h-3.5 w-16 rounded bg-muted"></div>
    </div>

    <!-- Price + CTA -->
    <div class="mt-auto flex items-center justify-between">
      <div class="space-y-1.5">
        <div class="h-3 w-16 rounded bg-muted"></div>
        <div class="h-5 w-20 rounded bg-muted"></div>
      </div>
      <div class="h-10 w-28 rounded-xl bg-muted"></div>
    </div>
  </div>
</article>
