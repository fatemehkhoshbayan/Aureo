@if (target(); as t) {
  <article class="fixed inset-0 z-40 flex items-center justify-center p-4" (click)="close.emit()">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

    <div
      class="relative bg-card rounded-2xl border border-border p-6 w-full max-w-sm shadow-2xl"
      (click)="$event.stopPropagation()"
    >
      <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
        <span class="icon-[lucide--alert-triangle] text-destructive text-2xl"></span>
      </div>

      <h3 class="text-lg font-bold text-foreground text-center mb-2">
        {{ title() }}
      </h3>
      <p class="text-sm text-muted-foreground text-center mb-6">
        {{ description() }}
      </p>

      <div class="flex gap-3">
        <button
          type="button"
          (click)="close.emit()"
          class="flex-1 py-3 rounded-xl font-semibold border border-border text-foreground hover:border-primary/40 transition-colors"
        >
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          (click)="confirm.emit(t); close.emit()"
          class="flex-1 py-3 rounded-xl font-semibold text-white bg-destructive hover:opacity-90"
        >
          {{ confirmLabel() }}
        </button>
      </div>
    </div>
  </article>
}
