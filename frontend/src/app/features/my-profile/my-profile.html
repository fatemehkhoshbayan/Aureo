<section class="max-w-5xl mx-auto gap-10 flex flex-col px-4 sm:px-6 lg:px-8 py-15">
  <div class="flex justify-between items-center gap-2">
    <div class="flex items-center gap-2">
      <span class="icon-[lucide--user] text-accent text-3xl"></span>
      <h1 class="text-3xl font-black text-foreground font-display">My Profile</h1>
    </div>
    @if (isLoggedIn()) {
      <button
        type="button"
        (click)="logout()"
        class="py-2 rounded-xl px-5 font-semibold flex items-center gap-2 border border-primary text-foreground hover:border-destructive/40 hover:text-destructive transition-colors"
      >
        <span class="icon-[lucide--log-out] text-xl"></span>
        Log out
      </button>
    }
  </div>

  @if (!isLoggedIn()) {
    <app-profile-log-in-form />
  } @else if (user()) {
    <app-profile-user-info />

    <app-quick-links [bookings]="bookings()" />

    <app-profile-preferences />
  } @else if (userLoading()) {
    <div
      class="bg-card rounded-3xl h-96 shadow-md p-8 flex flex-col items-center justify-center gap-4 text-center"
    >
      <p class="text-muted-foreground">Loading profile…</p>
    </div>
  } @else {
    <div
      class="bg-card rounded-3xl h-96 shadow-md p-8 flex flex-col items-center justify-center gap-4 text-center"
    >
      <p class="text-muted-foreground">{{ userError() || 'Could not load your profile.' }}</p>
      <div class="flex flex-wrap items-center justify-center gap-3">
        <button
          type="button"
          (click)="retryLoadProfile()"
          class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-primary hover:opacity-90 transition-opacity"
        >
          Try again
        </button>
        <button
          type="button"
          (click)="logout()"
          class="px-5 py-2.5 rounded-xl text-sm font-semibold border border-primary text-foreground hover:border-destructive/40 hover:text-destructive transition-colors"
        >
          Log out
        </button>
      </div>
    </div>
  }
</section>
