<div class="bg-card rounded-2xl shadow-md p-7 gap-4 flex flex-col">
  <h3 class="font-bold text-foreground">Preferences</h3>

  <div class="flex items-center justify-between py-4 border-b border-primary">
    <div class="flex items-center gap-3">
      <span
        [class]="
          (darkMode() ? 'icon-[lucide--moon]' : 'icon-[lucide--sun]') +
          ' text-xl text-muted-foreground'
        "
      ></span>
      <div class="gap-1.5 flex flex-col">
        <p class="text-sm font-semibold text-foreground">Appearance</p>
        <p class="text-sm text-muted-foreground">
          {{ darkMode() ? 'Dark mode' : 'Light mode' }} active
        </p>
      </div>
    </div>
    <button
      type="button"
      (click)="toggleDarkMode()"
      class="relative w-12 h-6 rounded-full transition-colors"
      [class.bg-primary]="darkMode()"
      [class.bg-muted]="!darkMode()"
      [attr.aria-pressed]="darkMode()"
    >
      <span
        class="absolute top-1 left-1 w-4 h-4 rounded-full bg-white shadow transition-transform"
        [class.translate-x-6]="darkMode()"
      ></span>
    </button>
  </div>

  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="icon-[lucide--mail] text-xl text-muted-foreground"></span>
      <div class="gap-1.5 flex flex-col">
        <p class="text-sm font-semibold text-foreground">Email Notifications</p>
        <p class="text-sm text-muted-foreground">Booking confirmations and reminders</p>
      </div>
    </div>
    <button
      type="button"
      (click)="toggleEmailNotifications()"
      class="relative w-12 h-6 rounded-full transition-colors"
      [class.bg-accent]="emailNotifications()"
      [class.bg-muted]="!emailNotifications()"
      [attr.aria-pressed]="emailNotifications()"
    >
      <span
        class="absolute top-1 left-1 w-4 h-4 rounded-full bg-white shadow transition-transform"
        [class.translate-x-6]="emailNotifications()"
      ></span>
    </button>
  </div>
</div>
