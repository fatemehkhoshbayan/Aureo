<form class="space-y-4" [formGroup]="draftForm" (ngSubmit)="saveProfile()">
  <div class="flex items-center gap-4">
    <div
      class="w-20 h-20 rounded-2xl overflow-hidden shrink-0 bg-muted flex items-center justify-center shadow-md"
    >
      @if (previewUrl()) {
        <img [src]="previewUrl()" alt="Avatar preview" class="w-full h-full object-cover" />
      } @else {
        <span class="icon-[lucide--user] text-2xl text-muted-foreground"></span>
      }
    </div>
    <label class="flex flex-col gap-1.5 text-sm cursor-pointer">
      <span class="font-semibold text-foreground">Profile photo</span>
      <span
        class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-border text-foreground hover:border-primary/40 transition-colors w-fit"
      >
        <span class="icon-[lucide--image-plus] text-sm"></span>
        Choose image
      </span>
      <input
        type="file"
        accept="image/jpeg,image/png,image/webp,image/gif"
        class="sr-only"
        (change)="onAvatarSelected($event)"
      />
      <span class="text-xs text-muted-foreground">JPEG, PNG, WebP, or GIF · max 2 MB</span>
    </label>
  </div>

  <div>
    <label class="block text-sm font-semibold text-foreground mb-1.5">Full Name</label>
    <input
      type="text"
      formControlName="name"
      class="w-full px-4 py-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40"
    />
  </div>
  <div>
    <label class="block text-sm font-semibold text-foreground mb-1.5">Email</label>
    <input
      type="email"
      formControlName="email"
      class="w-full px-4 py-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40"
    />
  </div>
  <div>
    <label class="block text-sm font-semibold text-foreground mb-1.5">Phone</label>
    <input
      type="tel"
      formControlName="phone"
      class="w-full px-4 py-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40"
    />
  </div>
  <div>
    <label class="block text-sm font-semibold text-foreground mb-1.5">Location</label>
    <input
      type="text"
      formControlName="location"
      class="w-full px-4 py-3 rounded-xl border border-border bg-input-background text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40"
    />
  </div>
  <div class="flex gap-3 pt-2">
    <button
      type="button"
      (click)="cancelEdit()"
      class="flex-1 py-3 rounded-xl font-semibold border border-border text-foreground"
    >
      Cancel
    </button>
    <button
      type="submit"
      class="flex-1 py-3 rounded-xl text-white font-bold bg-linear-to-br from-primary to-chart-3"
    >
      Save Changes
    </button>
  </div>
</form>
