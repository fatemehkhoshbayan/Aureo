<section class="max-w-5xl mx-auto gap-8 flex flex-col px-4 sm:px-6 lg:px-8 py-15">
  <div class="flex items-center gap-2">
    <span class="icon-[lucide--layout-dashboard] text-accent text-3xl"></span>
    <h1 class="text-3xl font-black text-foreground font-display">Photographer Dashboard</h1>
  </div>

  @if (loading()) {
    <div
      class="bg-card rounded-3xl h-64 shadow-md p-8 flex flex-col items-center justify-center gap-4 text-center"
    >
      <p class="text-muted-foreground">Loading your dashboard…</p>
    </div>
  } @else if (loadError()) {
    <div
      class="bg-card rounded-3xl h-64 shadow-md p-8 flex flex-col items-center justify-center gap-4 text-center"
    >
      <p class="text-muted-foreground">{{ loadError() }}</p>
      <button
        type="button"
        (click)="reload()"
        class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-primary hover:opacity-90 transition-opacity"
      >
        Try again
      </button>
    </div>
  } @else {
    <app-dashboard-profile-form
      [profile]="profile()"
      [isCreate]="needsProfile()"
      (saved)="onProfileSaved($event)"
    />

    @if (profile(); as p) {
      <app-dashboard-packages-list [packages]="p.packages" (changed)="onServicesChanged()" />
      <app-dashboard-portfolio-manager
        [items]="p.portfolio"
        [categories]="p.specialties"
        (changed)="onPortfolioChanged()"
      />
    }
  }
</section>
