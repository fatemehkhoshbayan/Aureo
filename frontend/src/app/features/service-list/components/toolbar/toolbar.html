<div
  class="flex sm:flex-row flex-col items-start sm:items-center justify-between gap-3 sm:gap-0 w-full"
>
  <div
    class="flex items-center sm:justify-center justify-between sm:items-center gap-3 w-full sm:w-auto"
  >
    <button
      type="button"
      (click)="filtersToggle.emit()"
      class="lg:hidden w-9 h-9 rounded-xl flex items-center justify-center border border-border hover:border-primary/40 text-muted-foreground hover:text-foreground transition-all hover:bg-primary/10"
      [attr.aria-expanded]="filtersOpen()"
      aria-label="Toggle filters"
    >
      <span
        [class]="(filtersOpen() ? 'icon-[lucide--x]' : 'icon-[lucide--filter]') + ' text-xl'"
      ></span>
    </button>
    <p class="text-md text-muted-foreground">
      <span class="font-semibold text-foreground">{{ count() }}</span> photographers
    </p>
  </div>
  <div class="relative flex items-center gap-2" #sortDropdown>
    <button
      type="button"
      (click)="toggleSortOpen()"
      (keydown.escape)="sortOpen.set(false)"
      class="relative min-w-44 rounded-xl shadow-md bg-card py-2 pl-3 pr-10 text-left text-sm font-medium text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40 cursor-pointer hover:bg-muted/30"
      [attr.aria-expanded]="sortOpen()"
      aria-haspopup="listbox"
    >
      {{ sortLabel() }}
      <span
        class="icon-[lucide--chevron-down] pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-base text-muted-foreground transition-transform"
        [class.rotate-180]="sortOpen()"
      ></span>
    </button>

    @if (sortOpen()) {
      <ul
        cdkListbox
        [cdkListboxValue]="[sortBy()]"
        (cdkListboxValueChange)="selectSort($event.value[0])"
        class="absolute right-0 z-[var(--z-dropdown)] top-full mt-2 min-w-full overflow-hidden rounded-xl shadow-md bg-card p-2"
      >
        @for (option of SORT_OPTIONS; track option.value) {
          <li
            [cdkOption]="option.value"
            class="w-full rounded-lg p-2 text-left text-sm text-primary font-medium cursor-pointer transition-all"
            [class.bg-primary]="sortBy() === option.value"
            [class.text-white]="sortBy() === option.value"
            [class.text-foreground]="sortBy() !== option.value"
            [class.hover:bg-muted]="sortBy() !== option.value"
          >
            {{ option.label }}
          </li>
        }
      </ul>
    }
  </div>
</div>
