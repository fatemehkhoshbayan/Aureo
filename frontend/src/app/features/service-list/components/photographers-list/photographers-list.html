<app-category-filter [categoryFilter]="categoryFilter()" (categoryChanged)="setCategory($event)" />
<section class="flex gap-8">
  <app-sidebar
    [photographers]="photographersName()"
    [photographerFilter]="photographerFilter()"
    [priceFilter]="priceFilter()"
    [showFilters]="showFilters()"
    (clearAllFilters)="clearAllFilters()"
    (photographerChanged)="setPhotographerFilter($event)"
    (priceChanged)="setPriceFilter($event)"
  />
  <div class="flex-1">
    <app-toolbar
      [count]="filtered().length"
      [(sortBy)]="sortBy"
      (filtersToggle)="toggleFilters()"
    />
    <section class="flex min-w-4xl">
      @if (loading()) {
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
          @for (i of [1, 2, 3, 4, 5, 6]; track i) {
            <app-skeleton-card />
          }
        </div>
      } @else if (filtered().length === 0) {
        <div
          class="w-full flex flex-col items-center justify-center text-center bg-card rounded-2xl shadow-md p-20 gap-8 min-h-[600px]"
        >
          <div class="w-20 h-20 rounded-full flex items-center justify-center mb-2 bg-secondary/30">
            <span class="icon-[lucide--camera] text-3xl text-secondary-dark/70"></span>
          </div>
          <h3 class="text-xl font-bold text-foreground">No photographers found</h3>
          <p class="text-md text-muted-foreground max-w-xs mb-3">
            Try adjusting your filters or searching with different keywords.
          </p>
          <button
            type="button"
            (click)="clearAllFilters()"
            class="px-5 py-2.5 rounded-xl text-white text-sm font-semibold bg-primary hover:bg-primary/40 hover:text-primary transition-colors"
          >
            Clear all filters
          </button>
        </div>
      } @else {
        <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
          @for (photographer of filtered(); track photographer.id) {
            <app-photographer-card
              [photographer]="photographer"
              [liked]="likedIds().has(photographer.id)"
              (likeToggled)="toggleLike(photographer.id)"
              (viewed)="onView(photographer.id)"
            />
          }
        </div>
      }
    </section>
  </div>
</section>
