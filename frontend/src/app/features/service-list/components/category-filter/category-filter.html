<div class="flex flex-col py-8">
  <h2 class="text-xl font-black text-foreground mb-5">Browse by Service</h2>
  <div class="grid grid-cols-4 lg:grid-cols-8 gap-3 mb-10">
    @for (cat of categories(); track cat.id) {
      <button
        (click)="categoryChanged.emit(cat.label)"
        class="rounded-2xl overflow-hidden relative h-15 lg:h-28 group transition-all hover:-translate-y-1 shadow-lg"
        [class.ring-3]="categoryFilter() === cat.label"
        [class.ring-primary]="categoryFilter() === cat.label"
      >
        <img
          [src]="'https://images.unsplash.com/' + cat.image + '?w=200&h=200&fit=crop&auto=format'"
          [alt]="cat.label"
          class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
        />
        <div class="absolute inset-0 bg-linear-to-t from-black/70 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-2 text-white">
          <p class="text-xs font-bold leading-tight">{{ cat.label }}</p>
          <p class="text-xs opacity-80">from {{ cat.from }}</p>
        </div>
      </button>
    }
  </div>
</div>
