<div class="mb-8">
  <div class="flex items-center justify-between relative">
    <div class="absolute top-5 left-0 right-0 h-0.5 bg-border z-0"></div>
    <div
      class="absolute top-5 left-0 h-0.5 z-0 transition-all duration-500 bg-primary"
      [style.width]="progressWidth()"
    ></div>
    @for (label of stepLabels; track label; let i = $index) {
      <div class="flex flex-col items-center gap-2 z-10">
        <div
          class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold border-2 transition-all duration-300"
          [class.bg-primary]="i + 1 <= step()"
          [class.border-primary]="i + 1 <= step()"
          [class.text-white]="i + 1 <= step()"
          [class.bg-card]="i + 1 > step()"
          [class.border-border]="i + 1 > step()"
          [class.text-muted-foreground]="i + 1 > step()"
        >
          @if (i + 1 < step()) {
            <span class="icon-[lucide--check] text-base"></span>
          } @else {
            {{ i + 1 }}
          }
        </div>
        <span class="text-xs font-medium text-muted-foreground hidden sm:block">{{ label }}</span>
      </div>
    }
  </div>
  <p class="text-center text-sm text-muted-foreground mt-3 sm:hidden">
    Step {{ step() }} of 3: {{ stepLabels[step() - 1] }}
  </p>
</div>
