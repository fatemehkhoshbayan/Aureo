<div class="bg-card rounded-2xl border border-border p-6 mb-6 flex items-center gap-3">
  <div class="w-20 h-20 rounded-xl overflow-hidden shrink-0 bg-muted">
    <img
      [src]="mediaUrl(photographer().avatar, { w: 100, h: 100, face: true })"
      [alt]="photographer().name"
      class="w-full h-full object-cover"
    />
  </div>
  <div class="min-w-0">
    <p class="font-bold text-foreground text-sm truncate">{{ photographer().name }}</p>
    <p class="text-xs text-muted-foreground">
      {{ photographer().location }} · {{ photographer().experience }} yrs experience
    </p>
  </div>
  <div class="ml-auto flex items-center gap-1 shrink-0">
    <span class="icon-[lucide--star] text-amber-500 text-sm"></span>
    <span class="text-sm font-bold text-foreground">{{ photographer().rating }}</span>
  </div>
</div>
