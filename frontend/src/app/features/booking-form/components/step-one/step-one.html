<div class="space-y-5">
  <h2 class="text-xl font-bold text-foreground font-display">Choose a Package</h2>
  <div class="space-y-3">
    @for (pkg of photographer().packages; track pkg.id) {
      <button
        type="button"
        (click)="selectPackage(pkg)"
        class="w-full text-left p-5 rounded-2xl border-2 transition-all"
        [class]="
          selectedPkgId() === pkg.id
            ? 'border-primary bg-primary/5'
            : 'border-border bg-card hover:border-primary/40'
        "
      >
        <div class="flex items-start justify-between gap-3 mb-2">
          <div>
            <p class="font-bold text-foreground">{{ pkg.name }}</p>
            <p class="text-xs text-muted-foreground">{{ pkg.duration }} · {{ pkg.description }}</p>
          </div>
          <div class="text-right shrink-0">
            <p class="font-black text-primary text-lg">{{ formatPrice(pkg.price) }}</p>
            @if (selectedPkgId() === pkg.id) {
              <div class="w-5 h-5 rounded-full flex items-center justify-center ml-auto bg-primary">
                <span class="icon-[lucide--check] text-white text-xs"></span>
              </div>
            }
          </div>
        </div>
        @if (sampleImages(pkg).length) {
          <div class="flex gap-1.5 mb-2 overflow-x-auto">
            @for (image of sampleImages(pkg); track image) {
              <img
                [src]="mediaUrl(image) || image"
                alt=""
                class="w-14 h-14 rounded-lg object-cover border border-border shrink-0"
              />
            }
          </div>
        }
        <ul class="space-y-0.5">
          @for (inc of pkg.includes; track inc) {
            <li class="flex items-center gap-2 text-xs text-muted-foreground">
              <span class="icon-[lucide--check] text-accent shrink-0 text-xs"></span>
              {{ inc }}
            </li>
          }
        </ul>
      </button>
    }
  </div>

  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-semibold text-foreground mb-1.5">Preferred Date</label>
      <div class="relative">
        <span
          class="icon-[lucide--calendar] absolute left-3.5 top-1/2 -translate-y-1/2 text-muted-foreground text-sm"
        ></span>
        <input
          type="date"
          [value]="date()"
          [min]="minDate()"
          (input)="date.set($any($event.target).value)"
          class="w-full pl-10 pr-3 py-3 rounded-xl border border-border bg-card text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40 text-sm"
        />
      </div>
    </div>
    <div>
      <label class="block text-sm font-semibold text-foreground mb-1.5">Time Slot</label>
      <div class="relative">
        <span
          class="icon-[lucide--clock] absolute left-3.5 top-1/2 -translate-y-1/2 text-muted-foreground text-sm"
        ></span>
        <select
          [value]="time()"
          (change)="time.set($any($event.target).value)"
          class="w-full pl-10 pr-3 py-3 rounded-xl border border-border bg-card text-foreground focus:outline-none focus:ring-2 focus:ring-primary/40 text-sm appearance-none"
        >
          <option value="">Select time</option>
          @for (slot of timeSlots; track slot) {
            <option [value]="slot">{{ slot }}</option>
          }
        </select>
      </div>
    </div>
  </div>

  @if (selectedPackage(); as pkg) {
    <div class="rounded-2xl p-4 flex items-center justify-between bg-secondary">
      <span class="text-sm font-semibold text-foreground">{{ pkg.name }}</span>
      <span class="text-xl font-black text-primary">{{ formatPrice(pkg.price) }}</span>
    </div>
  }

  <button
    type="button"
    (click)="continueToDetails()"
    class="w-full py-4 rounded-2xl text-white font-bold hover:opacity-90 transition-all bg-linear-to-br from-primary to-chart-3"
  >
    Continue
    <span class="icon-[lucide--chevron-right] inline text-lg ml-1 align-middle"></span>
  </button>
</div>
