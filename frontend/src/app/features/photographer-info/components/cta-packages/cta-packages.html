<div class="lg:col-span-1">
  <div class="sticky top-24 space-y-4">
    <div class="bg-card rounded-2xl border border-border p-6 shadow-sm">
      <p class="text-xs text-muted-foreground mb-1">Packages starting from</p>
      <p class="text-3xl font-black text-primary mb-1">
        {{ formatPrice(photographer().startingPrice) }}
      </p>
      <p class="text-xs text-muted-foreground mb-5">
        {{ photographer().packages.length }} packages available
      </p>
      <button
        type="button"
        (click)="setBook()"
        class="w-full py-4 rounded-2xl text-white font-bold text-base bg-primary hover:opacity-90 transition-all hover:scale-[1.02] active:scale-[0.98] shadow-lg"
      >
        Book This Photographer
      </button>
      <div class="mt-3 flex items-center gap-1.5 text-xs text-muted-foreground justify-center">
        <span class="icon-[lucide--check] text-accent text-sm"></span>
        Free cancellation · Secure payment
      </div>
    </div>

    <!-- Packages — same richness as booking step-one cards -->
    <div class="bg-card rounded-2xl border border-border p-5 space-y-3">
      <h3 class="font-bold text-foreground text-sm">Packages</h3>
      @for (pkg of photographer().packages; track pkg.id) {
        <button
          type="button"
          class="w-full text-left p-4 rounded-2xl border-2 border-border bg-card hover:border-primary/40 transition-all"
          (click)="setBook(pkg.id)"
        >
          <div class="flex items-start justify-between gap-3 mb-2">
            <div class="min-w-0">
              <p class="font-bold text-foreground">{{ pkg.name }}</p>
              <p class="text-xs text-muted-foreground">
                {{ pkg.duration }}
                @if (pkg.description) {
                  · {{ pkg.description }}
                }
              </p>
            </div>
            <p class="font-black text-primary text-lg shrink-0">{{ formatPrice(pkg.price) }}</p>
          </div>

          @if (sampleImages(pkg).length) {
            <div class="flex gap-1.5 mb-2 overflow-x-auto">
              @for (image of sampleImages(pkg); track image) {
                <img
                  [src]="mediaUrl(image) || image"
                  alt=""
                  class="w-14 h-14 rounded-lg object-cover border border-border shrink-0"
                />
              }
            </div>
          }

          @if (pkg.includes?.length) {
            <ul class="space-y-0.5">
              @for (inc of pkg.includes; track inc) {
                <li class="flex items-center gap-2 text-xs text-muted-foreground">
                  <span class="icon-[lucide--check] text-accent shrink-0 text-xs"></span>
                  {{ inc }}
                </li>
              }
            </ul>
          }
        </button>
      }
    </div>
  </div>
</div>
