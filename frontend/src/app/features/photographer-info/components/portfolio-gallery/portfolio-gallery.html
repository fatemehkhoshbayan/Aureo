<div>
  <div class="flex items-center gap-2 mb-4">
    <span class="icon-[lucide--grid-3x3] text-2xl text-muted-foreground"></span>
    <h2 class="text-xl font-bold text-foreground font-outfit">Portfolio</h2>
  </div>

  <div class="flex flex-wrap gap-2 mb-4">
    @for (cat of portfolioCategories(); track cat) {
      <button
        type="button"
        (click)="setPortfolioFilter(cat)"
        class="px-3 py-1.5 rounded-full text-sm font-semibold transition-all"
        [class]="
          portfolioFilter() === cat
            ? 'text-white bg-accent'
            : 'bg-muted text-muted-foreground hover:bg-muted/70'
        "
      >
        {{ cat }}
      </button>
    }
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
    @for (item of filteredPortfolio(); track item.id; let idx = $index) {
      <div
        class="rounded-2xl 1/1 overflow-hidden bg-muted hover:opacity-95 transition-opacity cursor-pointer"
        [class.col-span-2]="idx === 0"
        [class.row-span-2]="idx === 0"
      >
        <img
          [src]="
            'https://images.unsplash.com/' +
            item.image +
            '?w=' +
            (idx === 0 ? 800 : 400) +
            '&h=' +
            (idx === 0 ? 450 : 400) +
            '&fit=crop&auto=format'
          "
          [alt]="item.alt"
          class="w-full h-full object-cover hover:scale-105 transition-transform duration-500"
        />
      </div>
    }
  </div>
</div>
