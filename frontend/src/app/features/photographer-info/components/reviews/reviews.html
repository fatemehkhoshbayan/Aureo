<div class="flex flex-col py-8 gap-6">
  <div class="flex items-center gap-2">
    <span class="icon-[lucide--user-star] text-2xl text-muted-foreground"></span>
    <h2 class="text-xl font-bold text-foreground">Reviews</h2>
  </div>

  @if (reviews().length === 0) {
    <div
      class="flex flex-col items-center justify-center text-center rounded-2xl bg-card border border-border p-10 gap-3"
    >
      <span class="icon-[lucide--message-square-dashed] text-3xl text-muted-foreground"></span>
      <p class="text-sm font-semibold text-foreground">No reviews yet</p>
      <p class="text-xs text-muted-foreground max-w-xs">
        Be the first to book this photographer and share your experience.
      </p>
    </div>
  } @else {
    <div class="space-y-4">
      @for (review of reviews(); track review.id) {
        <div class="bg-card rounded-2xl p-5 shadow-lg">
          <div class="flex items-start gap-3 mb-3">
            <div class="w-10 h-10 rounded-full overflow-hidden shrink-0 bg-muted">
              <img
                [src]="mediaUrl(review.avatar, { w: 80, h: 80, face: true })"
                [alt]="review.author"
                class="w-full h-full object-cover"
              />
            </div>
            <div class="flex-1">
              <div class="flex items-center justify-between flex-wrap gap-2">
                <p class="font-semibold text-foreground text-sm">{{ review.author }}</p>
                <span class="text-xs text-muted-foreground">{{ formatDate(review.date) }}</span>
              </div>
              <div class="flex items-center gap-2 mt-0.5">
                <span class="icon-[lucide--star] text-primary/30 text-sm"></span>
                <span class="text-xs text-muted-foreground">· {{ review.service }}</span>
              </div>
            </div>
          </div>
          <div class="flex gap-2">
            <span class="icon-[lucide--quote] text-primary/30 text-sm"></span>
            <p class="text-sm text-muted-foreground leading-relaxed">{{ review.text }}</p>
          </div>
        </div>
      }
    </div>
  }
</div>
