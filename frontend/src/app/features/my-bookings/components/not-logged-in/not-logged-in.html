<section
  class="w-full flex flex-col items-center justify-center text-center bg-card rounded-2xl shadow-md p-12 my-10 sm:p-20 gap-8"
>
  <div class="w-20 h-20 rounded-full flex items-center justify-center bg-secondary/70">
    <span class="icon-[lucide--lock] text-3xl text-secondary-dark"></span>
  </div>
  <div class="flex flex-col gap-5">
    <h3 class="text-xl font-bold text-foreground">Sign in to view your bookings</h3>
    <p class="text-md text-muted-foreground max-w-sm">
      Log in to track upcoming sessions, review past bookings, and manage cancellations.
    </p>
  </div>
  <a
    routerLink="/my-profile"
    [queryParams]="{ returnUrl: '/my-bookings' }"
    class="px-5 py-2.5 rounded-xl text-white text-sm font-semibold bg-primary hover:opacity-90 transition-colors"
  >
    Go to login
  </a>
</section>
