services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aureo
      POSTGRES_PASSWORD: aureo
      POSTGRES_DB: aureo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aureo -d aureo"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://aureo:aureo@db:5432/aureo
      JWT_SECRET: change-me-to-a-long-random-secret
      CORS_ORIGINS: http://localhost:4200,http://localhost:8000
      SEED_ON_STARTUP: "true"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        PROJECT_NAME: aureo   
    ports:
      - "4200:80"
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
