<button
  type="button"
  (click)="select()"
  class="px-3 py-2 rounded-xl text-sm font-medium w-full text-left transition-all"
  [class.bg-primary]="current() === value()"
  [class.text-white]="current() === value()"
  [class.text-muted-foreground]="current() !== value()"
  [class.hover:bg-muted]="current() !== value()"
>
  {{ label() }}
</button>
