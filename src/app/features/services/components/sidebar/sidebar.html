<!-- Sidebar filters -->
<aside class="hidden lg:block w-56 shrink-0">
  <div class="bg-card rounded-2xl shadow-md p-5 sticky top-24 flex flex-col gap-6">
    <div>
      <p class="text-sm font-bold uppercase tracking-widest text-muted-foreground mb-3">
        Photographers
      </p>
      <div class="flex flex-col gap-2">
        @for (photographer of photographers(); track photographer) {
          <app-pill
            [label]="photographer"
            [value]="photographer"
            [current]="photographerFilter()"
            (changed)="photographerChanged.emit($event)"
          />
        }
      </div>
    </div>
    <hr class="border-primary" />
    <div>
      <p class="text-sm font-bold uppercase tracking-widest text-muted-foreground mb-3">
        Price Range
      </p>
      <div class="flex flex-col gap-2">
        @for (price of PRICE_OPTIONS; track price) {
          <app-pill
            [label]="price"
            [value]="price"
            [current]="priceFilter()"
            (changed)="priceChanged.emit($event)"
          />
        }
      </div>
    </div>
    <hr class="border-primary" />
    <button
      type="button"
      (click)="clearAllFilters.emit()"
      class="px-5 py-2.5 rounded-xl text-white text-sm w-full font-semibold bg-primary hover:bg-primary/40 hover:text-primary transition-colors"
    >
      Clear all filters
    </button>
  </div>
</aside>

<!-- Mobile filters -->
@if (showFilters()) {
  <div class="lg:hidden bg-card rounded-2xl shadow-md p-5 mb-5 space-y-4">
    <div>
      <p class="text-xs font-bold uppercase tracking-widest text-muted-foreground mb-2">
        Specialty
      </p>
      <div class="flex flex-wrap gap-2">
        @for (photographer of photographers(); track photographer) {
          <app-pill
            [label]="photographer"
            [value]="photographer"
            [current]="photographerFilter()"
            (changed)="photographerChanged.emit($event)"
          />
        }
      </div>
    </div>
    <div>
      <p class="text-xs font-bold uppercase tracking-widest text-muted-foreground mb-2">Price</p>
      <div class="flex flex-wrap gap-2">
        @for (price of PRICE_OPTIONS; track price) {
          <app-pill
            [label]="price"
            [value]="price"
            [current]="priceFilter()"
            (changed)="priceChanged.emit($event)"
          />
        }
      </div>
    </div>
  </div>
}
