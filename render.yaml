# Render Blueprint — API only. Database: Neon (set DATABASE_URL manually).
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aureo-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ON_STARTUP
        value: "true"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: CORS_ORIGINS
        sync: false
        value: http://localhost:4200,https://aureo-pi.vercel.app/
